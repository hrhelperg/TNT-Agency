[build]
  command = "npm install && npm run build"
  # Publish the Next.js build output (NOT the repo root). Without this Netlify
  # defaulted publish to the base dir, which served static root HTML and made
  # @netlify/plugin-nextjs fail ("publish directory cannot be the base directory").
  publish = ".next"

# Serve the Next.js app via the Netlify Next.js runtime (SSR/SSG pages, public/
# static assets at the web root, and API routes such as /api/send-email as
# functions). Without this the site was published as static repo-root HTML and
# Next routes (e.g. the calculator) were not served.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ──────────────────────────────────────────────
# Canonical host: talentpartnerid.com
# Permanent, path-preserving 301 redirects from every legacy host and from the
# www subdomain of the new domain. Netlify appends the original query string
# automatically. The apex talentpartnerid.com is intentionally NOT redirected
# (no self-redirect / loop), and each source points directly to the apex
# (single hop, no chains).
# ──────────────────────────────────────────────

# Legacy primary domain (current) → new canonical
[[redirects]]
  from   = "https://manpower-tnt.agency/*"
  to     = "https://talentpartnerid.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.manpower-tnt.agency/*"
  to     = "https://talentpartnerid.com/:splat"
  status = 301
  force  = true

# Legacy no-hyphen variant → new canonical
[[redirects]]
  from   = "https://manpowertnt.agency/*"
  to     = "https://talentpartnerid.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.manpowertnt.agency/*"
  to     = "https://talentpartnerid.com/:splat"
  status = 301
  force  = true

# Legacy tntgency.org → new canonical
[[redirects]]
  from   = "https://tntgency.org/*"
  to     = "https://talentpartnerid.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.tntgency.org/*"
  to     = "https://talentpartnerid.com/:splat"
  status = 301
  force  = true

# www of the new domain → apex canonical
[[redirects]]
  from   = "https://www.talentpartnerid.com/*"
  to     = "https://talentpartnerid.com/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
