[build]
  command = "npm install && npm run build"

# ──────────────────────────────────────────────
# Redirect old domain to new primary domain
# ──────────────────────────────────────────────
[[redirects]]
  from   = "https://tntgency.org/*"
  to     = "https://manpower-tnt.agency/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.tntgency.org/*"
  to     = "https://manpower-tnt.agency/:splat"
  status = 301
  force  = true

# www → apex
[[redirects]]
  from   = "https://www.manpower-tnt.agency/*"
  to     = "https://manpower-tnt.agency/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
