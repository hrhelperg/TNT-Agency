[build]
  publish = "."

# ──────────────────────────────────────────────
# Redirect old domain to new primary domain
# NOTE: tntgency.org must also be added as a
# domain alias in the Netlify dashboard and its
# DNS A/CNAME records must point to Netlify for
# this rule to execute.
# ──────────────────────────────────────────────
[[redirects]]
  from   = "https://tntgency.org/*"
  to     = "https://manpower-tnt.agency/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.tntgency.org/*"
  to     = "https://manpower-tnt.agency/:splat"
  status = 301
  force  = true

# www → apex
[[redirects]]
  from   = "https://www.manpower-tnt.agency/*"
  to     = "https://manpower-tnt.agency/:splat"
  status = 301
  force  = true

# ──────────────────────────────────────────────
# Clean URLs — serve .html files at path-only URLs
# status = 200 (rewrite, not redirect) keeps the
# URL clean in the browser address bar.
# ──────────────────────────────────────────────
[[redirects]]
  from   = "/agencies"
  to     = "/agencies.html"
  status = 200

[[redirects]]
  from   = "/submit-agency"
  to     = "/submit-agency.html"
  status = 200

[[redirects]]
  from   = "/offers"
  to     = "/offers.html"
  status = 200

[[redirects]]
  from   = "/submit-offer"
  to     = "/submit-offer.html"
  status = 200

[[redirects]]
  from   = "/contact"
  to     = "/contact.html"
  status = 200

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
