name: Post-Deploy Indexing

on:
  push:
    branches:
      - main

jobs:
  indexing:
    runs-on: ubuntu-latest
    # Skip bot commits that update the sitemap (prevents infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip indexing]')"

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run post-deploy indexing pipeline
        run: node scripts/post-deploy.js
        env:
          # Same value as the Netlify env var and the committed public key file
          # (public/<INDEXNOW_KEY>.txt). If this secret is not configured the
          # script logs a warning, skips IndexNow, and still exits 0.
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Commit updated sitemap back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml sitemap.xml
          if git diff --staged --quiet; then
            echo "Sitemap unchanged — nothing to commit"
          else
            git commit -m "chore: update sitemap lastmod [skip indexing]"
            git push
          fi
