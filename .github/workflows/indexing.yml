name: Post-Deploy Indexing

on:
  push:
    branches:
      - main

jobs:
  indexing:
    runs-on: ubuntu-latest

    # Read-only: the sitemap is now a static, hand-curated file. The pipeline
    # only validates it and pings IndexNow/Bing — it never commits back, so no
    # write permission and no bot-commit loop guard are needed.
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run post-deploy indexing pipeline
        run: node scripts/post-deploy.js
        env:
          # Same value as the Netlify env var and the committed public key file
          # (public/<INDEXNOW_KEY>.txt). If this secret is not configured the
          # script logs a warning, skips IndexNow, and still exits 0.
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
